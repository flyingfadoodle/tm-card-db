<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=960" />
  <title>Awards & Milestones - TM Database</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: Tahoma, sans-serif; color: #ddd; }

    #tab-bar { width:100%; background:#1a0e00; border-bottom:2px solid #8b6914; display:flex; padding:0 20px; gap:4px; }
    #tab-bar a { font-family:Prototype,serif; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:#a88848; text-decoration:none; padding:10px 20px 8px; border-bottom:3px solid transparent; display:inline-block; }
    #tab-bar a:hover { color:#e8c848; }
    #tab-bar a.active { color:#e8c848; border-bottom-color:#c8a848; }

    .page { max-width: 1300px; margin: 0 auto; padding: 30px 20px; }

    h2 {
      font-family: Prototype, serif;
      font-size: 16px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #c8a848;
      border-bottom: 1px solid #8b6914;
      padding-bottom: 8px;
      margin-bottom: 20px;
      margin-top: 30px;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .card {
      width: 156px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      overflow: hidden;
      cursor: default;
      transition: border-color .15s, box-shadow .15s;
      position: relative;
    }
    .card:hover {
      border-color: #8b6914;
      box-shadow: 0 0 10px rgba(139,105,20,0.4);
    }

    /* Icon: exact sprite size, clip to one icon height */
    .card-icon {
      width: 156px;
      height: 112px;
      background-repeat: no-repeat;
      background-size: 156px 1800px;
      flex-shrink: 0;
    }
    .card-icon.milestone {
      background-image: url('https://raw.githubusercontent.com/ssimeonoff/ssimeonoff.github.io/master/images/ma-randomizer/column_m.png');
    }
    .card-icon.award {
      background-image: url('https://raw.githubusercontent.com/ssimeonoff/ssimeonoff.github.io/master/images/ma-randomizer/column_a.png');
    }

    .card-name {
      font-family: Prototype, serif;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-align: center;
      padding: 6px 4px;
      color: #e8c848;
      background: #0d0d0d;
      border-top: 1px solid #333;
    }

    /* Tooltip */
    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a1000;
      border: 1px solid #8b6914;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      line-height: 1.5;
      color: #ddd;
      width: 220px;
      z-index: 100;
      pointer-events: none;
      white-space: normal;
    }
    .card:hover .tooltip { display: block; }
  </style>
</head>
<body>

<div id="tab-bar">
  <a href="index.html">Cards</a>
  <a href="awards.html" class="active">Awards &amp; Milestones</a>
  <a href="map-tharsis.html">Maps</a>
</div>

<div class="page">

  <h2>Milestones</h2>
  <div class="grid" id="milestones-grid"></div>

  <h2>Awards</h2>
  <div class="grid" id="awards-grid"></div>

</div>

<script>
const MILESTONES = [
  {name:'Terraformer',    desc:'29 TR.'},
  {name:'Mayor',          desc:'3 cities.'},
  {name:'Gardener',       desc:'3 greeneries.'},
  {name:'Builder',        desc:'7 building tags.'},
  {name:'Planner',        desc:'16 cards in hand.'},
  {name:'Generalist',     desc:'1 production of each resource.'},
  {name:'Specialist',     desc:'10 production of 1 resource.'},
  {name:'Ecologist',      desc:'4 bio tags (plant, microbe, animal).'},
  {name:'Tycoon',         desc:'15 project cards played.'},
  {name:'Legend',         desc:'4 event cards.'},
  {name:'Diversifier',    desc:'8 different tags.'},
  {name:'Tactician',      desc:'4 cards with requirements.'},
  {name:'Polar Explorer', desc:'3 tiles in the bottom 2 rows.'},
  {name:'Energizer',      desc:'6 energy production.'},
  {name:'Rim Settler',    desc:'3 Jovian tags.'},
  {name:'Hoverlord',      desc:'7 floater resources.'},
];

const AWARDS = [
  {name:'Landlord',       desc:'Most tiles.'},
  {name:'Scientist',      desc:'Most science tags.'},
  {name:'Banker',         desc:'Highest M€ production.'},
  {name:'Thermalist',     desc:'Most heat resources.'},
  {name:'Miner',          desc:'Most steel and titanium resources combined.'},
  {name:'Celebrity',      desc:'Most cards costing 20 M€ or more.'},
  {name:'Industrialist',  desc:'Most steel and energy resources combined.'},
  {name:'Desert Settler', desc:'Most tiles in the bottom 2 rows.'},
  {name:'Estate Dealer',  desc:'Most tiles next to ocean.'},
  {name:'Benefactor',     desc:'Highest TR. Count BEFORE all other A&M!'},
  {name:'Cultivator',     desc:'Most greeneries.'},
  {name:'Magnate',        desc:'Most green (automated) cards.'},
  {name:'Space Baron',    desc:'Most space tags.'},
  {name:'Excentric',      desc:'Most resources on cards.'},
  {name:'Contractor',     desc:'Most building tags.'},
  {name:'Venuphile',      desc:'Most Venus tags.'},
];

function buildGrid(items, containerId, type) {
  const grid = document.getElementById(containerId);
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const icon = document.createElement('div');
    icon.className = `card-icon ${type}`;
    icon.style.backgroundPositionY = -(i * 112) + 'px';

    const name = document.createElement('div');
    name.className = 'card-name';
    name.textContent = item.name;

    const tooltip = document.createElement('div');
    tooltip.className = 'tooltip';
    tooltip.textContent = item.desc;

    card.appendChild(icon);
    card.appendChild(name);
    card.appendChild(tooltip);
    grid.appendChild(card);
  });
}

buildGrid(MILESTONES, 'milestones-grid', 'milestone');
buildGrid(AWARDS, 'awards-grid', 'award');
</script>
</body>
</html>
