<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Maps - TM Database</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; font-family: Tahoma, Verdana, sans-serif; }

    /* Tab bar - do not change */
    #tab-bar { width:100%; background:#1a0e00; border-bottom:2px solid #8b6914; display:flex; padding:0 20px; gap:4px; }
    #tab-bar a { font-family:Prototype,serif; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:#a88848; text-decoration:none; padding:10px 20px 8px; border-bottom:3px solid transparent; display:inline-block; }
    #tab-bar a:hover { color:#e8c848; }
    #tab-bar a.active { color:#e8c848; border-bottom-color:#c8a848; }

    /* Map sub-nav */
    #map-nav {
      display: flex;
      gap: 0;
      padding: 12px 20px 0;
      border-bottom: 1px solid #333;
    }
    #map-nav button {
      font-family: Tahoma, sans-serif;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #888;
      background: #111;
      border: 1px solid #333;
      border-bottom: none;
      padding: 7px 20px;
      cursor: pointer;
      margin-right: 2px;
      border-radius: 4px 4px 0 0;
    }
    #map-nav button.active { color: #e8c848; background: #1a1000; border-color: #8b6914; }
    #map-nav button:hover:not(.active) { color: #ccc; }

    /* Board container - matches original exactly */
    .board-section { display: none; padding: 20px; }
    .board-section.active { display: flex; justify-content: center; }

    .board-cont {
      display: inline-block;
      vertical-align: top;
      width: 670px;
      position: relative;
    }

    /* Board background images */
    .board-tharsis  { background: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/board/mars-without-venus.png') no-repeat; }
    .board-hellas   { background: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/board/mars-without-venus.png') no-repeat; }
    .board-elysium  { background: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/board/mars-without-venus.png') no-repeat; }

    /* The hex grid - exact match to original */
    .board {
      width: 600px;
      height: 488px;
      margin: 85px 0 0 93px;
      position: relative;
    }

    /* Each hex space - exact from board.less */
    .board-space {
      clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
      width: 44px;
      height: 44px;
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Space type colors */
    .board-space--ocean   { background: rgba(10, 90, 200, 0.7); }
    .board-space--land    { background: rgba(0,0,0,0); }
    .board-space--volcanic { background: rgba(0,0,0,0); }
    .board-space--restricted { background: rgba(0,0,0,0.5); }

    /* Volcanic border - using outline trick via box-shadow won't work with clip-path
       Use a wrapper with a pseudo element instead */
    .board-space-wrap { position: absolute; }
    .board-space-wrap.volcanic::after {
      content: '';
      position: absolute;
      inset: -3px;
      clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
      background: rgba(255,180,0,0.25);
      pointer-events: none;
      z-index: 2;
    }

    /* Bonus icons - exact from board.less */
    .board-space-bonus {
      position: absolute;
      pointer-events: none;
      width: 16px;
      height: 16px;
      margin: 0 0 0 2px;
      border-radius: 2px;
      background-size: 16px;
      background-repeat: no-repeat;
    }
    .board-space-bonus-pos--only { margin: 14px 0 0 14px; }
    .board-space-bonus-pos--1    { margin: 14px 0 0 5px; }
    .board-space-bonus-pos--2    { margin: 14px 0 0 23px; }
    .board-space-bonus-pos--3    { margin: 23px 0 0 14px; }

    .board-space-bonus--plant    { background-image: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/resources/plant.png'); }
    .board-space-bonus--steel    { background-image: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/resources/steel.png'); }
    .board-space-bonus--titanium { background-image: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/resources/titanium.png'); }
    .board-space-bonus--card     { background-image: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/resources/card.png'); height: 20px; }
    .board-space-bonus--heat     { background-image: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/resources/heat.png'); }
    .board-space-bonus--bonusocean {
      background-image: url('https://raw.githubusercontent.com/terraforming-mars/terraforming-mars/main/assets/board/colony.png');
      background-size: 32px 21px; width: 36px; height: 21px;
    }

    /* SVG legend overlay */
    .board-legend {
      position: absolute;
      margin: -67px 0 0 -100px;
      z-index: 5;
      pointer-events: none;
    }
    .board-caption {
      font-family: Tahoma, Verdana, sans-serif;
      font-size: 10px;
      font-weight: bold;
      fill: white;
      pointer-events: none;
    }
    .board-line {
      stroke: white;
      stroke-width: 3;
      stroke-opacity: 0.3;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="tab-bar">
  <a href="index.html">Cards</a>
  <a href="awards.html">Awards &amp; Milestones</a>
  <a href="map-tharsis.html" class="active">Maps</a>

<!-- THARSIS -->
<div id="map-tharsis" class="board-section active">

</div>

<!-- HELLAS -->
<div id="map-hellas" class="board-section">

</div>

<!-- ELYSIUM -->
<div id="map-elysium" class="board-section">
  <div class="board-cont board-elysium" id="board-elysium-cont"></div>
</div>

<script>
const P = 'plant', S = 'steel', T = 'titanium', C = 'card', H = 'heat', O = 'bonusocean';

// Board data: [id, type, bonuses]
// type: L=land, V=volcanic, O=ocean
const THARSIS = [
  // y=0
  ['03','L',[S,S]], ['04','O',[S,S]], ['05','L',[]], ['06','O',[C]], ['07','O',[]],
  // y=1
  ['08','L',[]], ['09','V',[S]], ['10','L',[]], ['11','L',[]], ['12','L',[]], ['13','O',[C,C]],
  // y=2
  ['14','V',[C]], ['15','L',[]], ['16','L',[]], ['17','L',[]], ['18','L',[]], ['19','L',[]], ['20','L',[S]],
  // y=3
  ['21','V',[P,T]], ['22','L',[P]], ['23','L',[P]], ['24','L',[P]], ['25','L',[P,P]], ['26','L',[P]], ['27','L',[P]], ['28','O',[P,P]],
  // y=4
  ['29','V',[P,P]], ['30','L',[P,P]], ['31','L',[P,P]], ['32','O',[P,P]], ['33','O',[P,P]], ['34','O',[P,P]], ['35','L',[P,P]], ['36','L',[P,P]], ['37','L',[P,P]],
  // y=5
  ['38','L',[P]], ['39','L',[P,P]], ['40','L',[P]], ['41','L',[P]], ['42','L',[P]], ['43','O',[P]], ['44','O',[P]], ['45','O',[P]],
  // y=6
  ['46','L',[]], ['47','L',[]], ['48','L',[]], ['49','L',[]], ['50','L',[]], ['51','L',[P]], ['52','L',[]],
  // y=7
  ['53','L',[S,S]], ['54','L',[]], ['55','L',[C]], ['56','L',[C]], ['57','L',[]], ['58','L',[T]],
  // y=8
  ['59','L',[S]], ['60','L',[S,S]], ['61','L',[]], ['62','L',[]], ['63','O',[T,T]],
];

const HELLAS = [
  // y=0
  ['03','O',[P,P]], ['04','L',[P,P]], ['05','L',[P,P]], ['06','L',[P,S]], ['07','L',[P]],
  // y=1
  ['08','O',[P,P]], ['09','L',[P,P]], ['10','L',[P]], ['11','L',[P,S]], ['12','L',[P]], ['13','L',[P]],
  // y=2
  ['14','O',[P]], ['15','L',[P]], ['16','L',[S]], ['17','L',[S]], ['18','L',[]], ['19','L',[P,P]], ['20','L',[P,C]],
  // y=3
  ['21','O',[P]], ['22','L',[P]], ['23','L',[S]], ['24','L',[S,S]], ['25','L',[S]], ['26','O',[P]], ['27','O',[P]], ['28','L',[P]],
  // y=4
  ['29','L',[C]], ['30','L',[]], ['31','L',[]], ['32','L',[S,S]], ['33','L',[]], ['34','O',[C]], ['35','O',[H,H,H]], ['36','O',[]], ['37','L',[P]],
  // y=5
  ['38','L',[T]], ['39','L',[]], ['40','L',[S]], ['41','L',[]], ['42','L',[]], ['43','O',[]], ['44','O',[S]], ['45','L',[]],
  // y=6
  ['46','O',[T,T]], ['47','L',[]], ['48','L',[]], ['49','L',[C]], ['50','L',[]], ['51','L',[]], ['52','L',[T]],
  // y=7
  ['53','L',[S]], ['54','L',[C]], ['55','L',[H,H]], ['56','L',[H,H]], ['57','L',[T]], ['58','L',[T]],
  // y=8
  ['59','L',[]], ['60','L',[H,H]], ['61','L',[O]], ['62','L',[H,H]], ['63','L',[]],
];

const ELYSIUM = [
  // y=0
  ['03','O',[]], ['04','O',[T]], ['05','O',[C]], ['06','O',[S]], ['07','L',[C]],
  // y=1
  ['08','V',[T]], ['09','L',[]], ['10','L',[]], ['11','O',[]], ['12','O',[]], ['13','L',[S,S]],
  // y=2
  ['14','V',[T,T]], ['15','L',[]], ['16','L',[C]], ['17','L',[]], ['18','O',[P]], ['19','O',[]], ['20','V',[C,C,C]],
  // y=3
  ['21','L',[P]], ['22','L',[P]], ['23','L',[P]], ['24','O',[P,P]], ['25','L',[P]], ['26','O',[P]], ['27','O',[P]], ['28','L',[P,S]],
  // y=4
  ['29','L',[P,P]], ['30','L',[P,P]], ['31','L',[P,P]], ['32','O',[P,P]], ['33','L',[P,P]], ['34','L',[P,P,P]], ['35','L',[P,P]], ['36','L',[P,P]], ['37','V',[P,T]],
  // y=5
  ['38','L',[S]], ['39','L',[P]], ['40','L',[P]], ['41','L',[P]], ['42','L',[P]], ['43','L',[P]], ['44','L',[P]], ['45','L',[]],
  // y=6
  ['46','L',[T]], ['47','L',[S]], ['48','L',[]], ['49','L',[]], ['50','L',[S]], ['51','L',[]], ['52','L',[]],
  // y=7
  ['53','L',[S,S]], ['54','L',[]], ['55','L',[]], ['56','L',[]], ['57','L',[S,S]], ['58','L',[]],
  // y=8
  ['59','L',[S]], ['60','L',[]], ['61','L',[C]], ['62','L',[C]], ['63','L',[S,S]],
];

const LEGENDS = {
  tharsis: `<g transform="translate(95,192)"><text class="board-caption"><tspan dy="15">Ascraeus</tspan><tspan x="12" dy="12">Mons</tspan></text><line x1="38" y1="20" x2="88" y2="26" class="board-line"/><text x="86" y="29" class="board-caption" fill="white">●</text></g>
<g transform="translate(90,230)"><text class="board-caption"><tspan dy="15">Pavonis</tspan><tspan x="4" dy="12">Mons</tspan></text><line x1="35" y1="25" x2="72" y2="30" class="board-line"/><text x="66" y="33" class="board-caption" fill="white">●</text></g>
<g transform="translate(77,275)"><text class="board-caption"><tspan dy="15">Arsia</tspan><tspan x="-2" dy="12">Mons</tspan></text><line x1="25" y1="20" x2="49" y2="26" class="board-line"/><text x="47" y="29" class="board-caption" fill="white">●</text></g>
<g transform="translate(85,175)"><text class="board-caption" dx="47"><tspan dy="-7">Tharsis</tspan><tspan dy="12" x="48">Tholus</tspan></text><line y1="-3" x2="160" y2="2" class="board-line" x1="90"/><text x="158" y="5" class="board-caption" fill="white">●</text></g>
<g transform="translate(85,320)"><text class="board-caption"><tspan dy="15">Noctis</tspan><tspan x="7" dy="12">City</tspan></text><line x1="30" y1="20" x2="140" y2="-20" class="board-line"/><text x="136" y="-18" class="board-caption" fill="white">●</text></g>`,

  hellas: `<g transform="translate(230,420)"><text class="board-caption"><tspan dy="15">Hellas</tspan><tspan x="2" dy="12">Sea</tspan></text><line x1="30" y1="10" x2="55" y2="-30" class="board-line"/><text x="53" y="-27" class="board-caption" fill="white">●</text></g>`,

  elysium: `<g transform="translate(110,190)"><text class="board-caption"><tspan dy="15">Elysium</tspan><tspan x="8" dy="12">Mons</tspan></text></g>
<g transform="translate(130,150)"><text class="board-caption"><tspan dy="15">Hecatus</tspan><tspan x="3" dy="12">Tholus</tspan></text></g>
<g transform="translate(545,272)"><text class="board-caption"><tspan dy="15">Arsia</tspan><tspan x="0" dy="12">Mons</tspan></text></g>
<g transform="translate(505,190)"><text class="board-caption"><tspan x="-5" dy="15">Olympus</tspan><tspan x="4" dy="12">Mons</tspan></text></g>`,
};

function bonusClass(b) {
  const map = {plant:'plant', steel:'steel', titanium:'titanium', card:'card', heat:'heat', bonusocean:'bonusocean'};
  return 'board-space-bonus board-space-bonus--' + map[b];
}

function bonusPos(i, total) {
  if (total === 1) return ' board-space-bonus-pos--only';
  if (i === 0) return ' board-space-bonus-pos--1';
  if (i === 1) return ' board-space-bonus-pos--2';
  return ' board-space-bonus-pos--3';
}

function buildBoard(containerId, spaces, legendKey) {
  const cont = document.getElementById(containerId);
  
  // Build inner board div
  const board = document.createElement('div');
  board.className = 'board';

  spaces.forEach(([id, type, bonuses]) => {
    const wrap = document.createElement('div');
    wrap.className = `board-space-wrap${type === 'V' ? ' volcanic' : ''}`;

    const space = document.createElement('div');
    space.className = `board-space board-space-${id} board-space--${type === 'O' ? 'ocean' : type === 'V' ? 'volcanic' : 'land'}`;

    bonuses.forEach((b, i) => {
      const icon = document.createElement('div');
      icon.className = bonusClass(b) + bonusPos(i, bonuses.length);
      space.appendChild(icon);
    });

    wrap.appendChild(space);
    board.appendChild(wrap);
  });

  // SVG legend
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('height', '550');
  svg.setAttribute('width', '630');
  svg.setAttribute('class', 'board-legend');
  svg.innerHTML = LEGENDS[legendKey] || '';

  board.appendChild(svg);
  cont.appendChild(board);
}

buildBoard('board-tharsis-cont', THARSIS, 'tharsis');
buildBoard('board-hellas-cont', HELLAS, 'hellas');
buildBoard('board-elysium-cont', ELYSIUM, 'elysium');

function showMap(name, btn) {
  document.querySelectorAll('.board-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('#map-nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('map-' + name).classList.add('active');
  btn.classList.add('active');
}
</script>
