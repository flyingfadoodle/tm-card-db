<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Terraforming Mars Cards List</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a0a00;
  --surface:#2a1200;
  --border:#4a2800;
  --text:#e8d8b8;
  --muted:#a88858;
  --gold:#c8a848;
  --red-tab:#8b2020;
  --green-tab:#1a4a1a;
  --blue-tab:#1a2a5a;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px}

/* HEADER */
#header{background:#0a0500;border-bottom:2px solid #6a3800;padding:8px 12px;text-align:center}
#header h1{font-size:14px;font-weight:700;letter-spacing:.15em;color:var(--gold);text-transform:uppercase}
#selected-link{font-size:11px;color:var(--muted);display:inline-block;margin-top:2px;text-decoration:none}
#selected-link span{color:var(--gold);font-weight:700}

/* TABS */
#tabs{background:#150800;border-bottom:1px solid #4a2800;display:flex;overflow-x:auto}
.tab{padding:7px 14px;background:none;border:none;border-right:1px solid #3a1800;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.tab:hover{background:#2a1000;color:var(--text)}
.tab.active{background:var(--surface);color:var(--gold);border-bottom:2px solid var(--gold)}

/* LAYOUT */
#shell{display:flex;height:calc(100vh - 72px)}

/* SIDEBAR */
#sidebar{width:200px;flex-shrink:0;background:#120600;border-right:1px solid var(--border);padding:10px 8px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.side-section{border:1px solid var(--border);border-radius:3px;overflow:hidden}
.side-head{background:#2a1200;padding:5px 8px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold)}
.side-body{padding:8px}

/* Search */
#search{width:100%;background:#0a0400;border:1px solid var(--border);border-radius:2px;color:var(--text);padding:5px 8px;font-size:12px;outline:none}
#search:focus{border-color:var(--gold)}

/* Sort buttons */
.sort-row{display:flex;gap:3px;flex-wrap:wrap}
.sort-btn{padding:3px 8px;background:#0a0400;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;letter-spacing:.05em}
.sort-btn:hover{border-color:var(--gold);color:var(--text)}
.sort-btn.active{background:#3a1a00;border-color:var(--gold);color:var(--gold)}

/* Expansion toggles */
.exp-row{display:flex;flex-direction:column;gap:3px}
.exp-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;padding:2px 0;font-size:11px;color:var(--muted)}
.exp-toggle input{accent-color:var(--gold);cursor:pointer}
.exp-toggle:hover{color:var(--text)}
.exp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.exp-dot.base{background:#4a8a4a}
.exp-dot.venus{background:#8a4a6a}
.exp-dot.colonies{background:#4a6a8a}
.exp-dot.turmoil{background:#8a4a4a}
.exp-dot.promo{background:#8a8a4a}

/* Cost range */
.range-row{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--muted)}
input[type=range]{flex:1;accent-color:var(--gold)}
.range-val{min-width:24px;text-align:right;color:var(--gold);font-weight:700}

/* Count */
#count{font-size:11px;color:var(--muted);text-align:center;padding:4px}

/* MAIN */
#main{flex:1;overflow-y:auto;padding:8px}

/* CARD GRID */
#cards{display:flex;flex-wrap:wrap;gap:6px;align-content:flex-start}

.card-wrap{position:relative;cursor:pointer;border:2px solid transparent;border-radius:4px;overflow:hidden;transition:border-color .1s,transform .1s;flex-shrink:0}
.card-wrap:hover{border-color:var(--gold);transform:scale(1.02);z-index:10}
.card-wrap.selected{border-color:#f0c040;box-shadow:0 0 8px rgba(240,192,64,.5)}

.card-wrap img{display:block;width:150px;height:auto;border-radius:2px}
.card-wrap .card-ph{width:150px;height:210px;background:#1a0a00;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:2px}
.card-ph .ph-name{font-size:10px;font-weight:600;color:var(--muted);text-align:center;padding:0 6px;line-height:1.3}
.card-ph .ph-id{font-size:9px;color:#4a2800}
.card-ph .ph-cost{width:28px;height:28px;border-radius:50%;background:#2a1200;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--gold)}

/* type color bar */
.card-type-bar{position:absolute;bottom:0;left:0;right:0;height:4px}
.card-wrap.automated .card-type-bar{background:#2d7a2d}
.card-wrap.active .card-type-bar{background:#1e6091}
.card-wrap.event .card-type-bar{background:#8b2020}
.card-wrap.corp .card-type-bar{background:#5a1a7a}
.card-wrap.prelude .card-type-bar{background:#8a5a1a}

/* selected counter on card */
.card-sel-badge{position:absolute;top:4px;right:4px;background:rgba(240,192,64,.9);color:#000;font-size:9px;font-weight:700;padding:1px 5px;border-radius:2px;display:none}
.card-wrap.selected .card-sel-badge{display:block}

/* DETAIL PANEL */
#detail{width:280px;flex-shrink:0;background:#120600;border-left:1px solid var(--border);overflow-y:auto;display:none}
#detail.open{display:block}
#detail-inner{padding:12px}
#detail img{width:100%;border-radius:3px;margin-bottom:10px}
#detail-name{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:4px}
#detail-id{font-size:10px;color:var(--muted);margin-bottom:8px}
#detail-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.dtag{padding:2px 6px;border-radius:2px;font-size:9px;font-weight:700;text-transform:uppercase}
.dtag.building{background:#8b6914;color:#ffe}
.dtag.space{background:#1a5a7c;color:#e8f4ff}
.dtag.science{background:#2d7c2d;color:#e8ffe8}
.dtag.earth{background:#5a3a1a;color:#ffe8d8}
.dtag.plant{background:#2d5a1a;color:#d8ffd8}
.dtag.microbe{background:#1a5a3a;color:#d8ffec}
.dtag.animal{background:#5a2d1a;color:#ffd8c8}
.dtag.power{background:#5a1a5a;color:#f8d8ff}
.dtag.jovian{background:#1a3a7c;color:#d8e8ff}
.dtag.venus{background:#7c1a5a;color:#ffd8f0}
.dtag.city{background:#5a5a1a;color:#fffff0}
.dtag.steel,.dtag.wild{background:#3a3a1a;color:#ddd}
#detail-meta{font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.6}
#detail-meta span{color:var(--text)}
#detail-text{font-size:12px;color:#c8c8a8;line-height:1.7;border-top:1px solid var(--border);padding-top:8px}
#detail-close{width:100%;padding:6px;background:#2a1200;border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;margin-top:10px;border-radius:2px}
#detail-close:hover{border-color:var(--gold);color:var(--text)}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px;width:100%}
</style>
</head>
<body>

<div id="header">
  <h1>Terraforming Mars — Cards List</h1>
  <a id="selected-link" href="#">SELECTED <span id="sel-count">0</span></a>
</div>

<div id="tabs">
  <button class="tab active" data-tab="all" onclick="setTab('all',this)">ALL</button>
  <button class="tab" data-tab="automated" onclick="setTab('automated',this)">AUTOMATED</button>
  <button class="tab" data-tab="active" onclick="setTab('active',this)">ACTIVE</button>
  <button class="tab" data-tab="event" onclick="setTab('event',this)">EVENTS</button>
  <button class="tab" data-tab="corp" onclick="setTab('corp',this)">CORPS</button>
  <button class="tab" data-tab="prelude" onclick="setTab('prelude',this)">PRELUDES</button>
</div>

<div id="shell">
  <div id="sidebar">

    <div class="side-section">
      <div class="side-head">Search</div>
      <div class="side-body">
        <input id="search" type="text" placeholder="Card name…" autocomplete="off" oninput="render()"/>
      </div>
    </div>

    <div class="side-section">
      <div class="side-head">Sort by</div>
      <div class="side-body">
        <div class="sort-row">
          <button class="sort-btn active" data-sort="id" onclick="setSort('id',this)">ID</button>
          <button class="sort-btn" data-sort="cost_asc" onclick="setSort('cost_asc',this)">MC ↑</button>
          <button class="sort-btn" data-sort="cost_desc" onclick="setSort('cost_desc',this)">MC ↓</button>
          <button class="sort-btn" data-sort="name" onclick="setSort('name',this)">A–Z</button>
        </div>
      </div>
    </div>

    <div class="side-section">
      <div class="side-head">MC Cost</div>
      <div class="side-body" style="display:flex;flex-direction:column;gap:6px">
        <div class="range-row">
          <span>Min</span>
          <input type="range" id="costMin" min="0" max="50" value="0" oninput="document.getElementById('costMinVal').textContent=this.value;render()"/>
          <span class="range-val" id="costMinVal">0</span>
        </div>
        <div class="range-row">
          <span>Max</span>
          <input type="range" id="costMax" min="0" max="50" value="50" oninput="document.getElementById('costMaxVal').textContent=this.value;render()"/>
          <span class="range-val" id="costMaxVal">50</span>
        </div>
      </div>
    </div>

    <div class="side-section">
      <div class="side-head">Expansion</div>
      <div class="side-body">
        <div class="exp-row">
          <label class="exp-toggle"><input type="checkbox" checked onchange="toggleExp('base')"/><div class="exp-dot base"></div>Base</label>
          <label class="exp-toggle"><input type="checkbox" checked onchange="toggleExp('venus')"/><div class="exp-dot venus"></div>Venus</label>
          <label class="exp-toggle"><input type="checkbox" checked onchange="toggleExp('colonies')"/><div class="exp-dot colonies"></div>Colonies</label>
          <label class="exp-toggle"><input type="checkbox" checked onchange="toggleExp('turmoil')"/><div class="exp-dot turmoil"></div>Turmoil</label>
          <label class="exp-toggle"><input type="checkbox" checked onchange="toggleExp('promo')"/><div class="exp-dot promo"></div>Promo</label>
        </div>
      </div>
    </div>

    <div id="count">— cards</div>

  </div>

  <div id="main">
    <div id="cards"></div>
  </div>

  <div id="detail">
    <div id="detail-inner">
      <button id="detail-close" onclick="closeDetail()">✕ Close</button>
    </div>
  </div>
</div>

let tab='all', sort='id', exps=new Set(['base','venus','colonies','turmoil','promo']);
let selected=new Set(), detail=null;

function setTab(t,el){tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function setSort(s,el){sort=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function toggleExp(e){const cb=event.target;if(cb.checked)exps.add(e);else exps.delete(e);render();}

function filtered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const cmin=+document.getElementById('costMin').value;
  const cmax=+document.getElementById('costMax').value;
  return CARDS.filter(c=>{
    if(!exps.has(c.exp)) return false;
    if(tab!=='all'&&c.type!==tab) return false;
    const cost=Number(c.cost)||0;
    if(c.type!=='corp'&&c.type!=='prelude'&&(cost<cmin||cost>cmax)) return false;
    if(q) return c.name.toLowerCase().includes(q)||c.id.toLowerCase().includes(q)||(c.tags||[]).some(t=>t.includes(q));
    return true;
  });
}

function sorted(cards){
  return cards.slice().sort((a,b)=>{
    if(sort==='id') return String(a.id).localeCompare(String(b.id),undefined,{numeric:true});
    if(sort==='cost_asc') return (Number(a.cost)||0)-(Number(b.cost)||0);
    if(sort==='cost_desc') return (Number(b.cost)||0)-(Number(a.cost)||0);
    if(sort==='name') return a.name.localeCompare(b.name);
    return 0;
  });
}

function toggleSelect(id,e){
  e.stopPropagation();
  if(selected.has(id)) selected.delete(id); else selected.add(id);
  document.getElementById('sel-count').textContent=selected.size;
  const el=document.getElementById('cw-'+id);
  if(el) el.classList.toggle('selected',selected.has(id));
}

function openDetail(c){
  detail=c;
  const img=IMG_MAP[c.id];
  const d=document.getElementById('detail-inner');
  d.innerHTML=
    '<button id="detail-close" onclick="closeDetail()">✕ Close</button>'+
    (img?'<img src="'+img+'" loading="lazy" alt="'+esc(c.name)+'"/>':'')+
    '<div id="detail-name">'+esc(c.name)+'</div>'+
    '<div id="detail-id">#'+esc(c.id)+' · '+esc(c.exp)+(c.cost&&c.type!=='corp'&&c.type!=='prelude'?' · '+c.cost+' MC':''+(c.type==='corp'?'Corporation':c.type==='prelude'?'Prelude':''))+'</div>'+
    '<div id="detail-tags">'+((c.tags||[]).map(t=>'<span class="dtag '+t+'">'+t+'</span>').join(''))+'</div>'+
    '<div id="detail-meta">'+
      (c.req?'<div>Req: <span>'+esc(c.req)+'</span></div>':'')+
      (c.vp?'<div>VP: <span>'+esc(c.vp)+'</span></div>':'')+
    '</div>'+
    (c.text?'<div id="detail-text">'+esc(c.text)+'</div>':'')+
    '<button id="detail-close" onclick="closeDetail()" style="margin-top:10px;width:100%;padding:6px;background:#2a1200;border:1px solid #4a2800;color:#a88858;font-size:11px;cursor:pointer;border-radius:2px">✕ Close</button>';
  document.getElementById('detail').classList.add('open');
}

function closeDetail(){detail=null;document.getElementById('detail').classList.remove('open');}

function render(){
  const cards=sorted(filtered());
  document.getElementById('count').textContent=cards.length+' cards';
  if(!cards.length){document.getElementById('cards').innerHTML='<div class="empty">No cards match.</div>';return;}
  document.getElementById('cards').innerHTML=cards.map(c=>{
    const img=IMG_MAP[c.id];
    const isSel=selected.has(c.id);
    return '<div class="card-wrap '+c.type+(isSel?' selected':'')+'" id="cw-'+c.id+'" onclick="openDetail(CARDS.find(x=>x.id===\''+c.id+'\'))">'+
      '<div class="card-sel-badge">✓</div>'+
      (img?'<img src="'+img+'" loading="lazy" width="150" alt="'+esc(c.name)+'" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'"/><div class="card-ph" style="display:none"><div class="ph-cost">'+(c.type==='corp'?'C':c.type==='prelude'?'P':c.cost||'')+'</div><div class="ph-name">'+esc(c.name)+'</div><div class="ph-id">#'+esc(c.id)+'</div></div>':
       '<div class="card-ph"><div class="ph-cost">'+(c.type==='corp'?'C':c.type==='prelude'?'P':c.cost||'')+'</div><div class="ph-name">'+esc(c.name)+'</div><div class="ph-id">#'+esc(c.id)+'</div></div>')+
      '<div class="card-type-bar"></div>'+
    '</div>';
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

render();
</script>
</body>
</html>
