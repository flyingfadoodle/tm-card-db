<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TM Card Database</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a2e;--surface:#16213e;--surface2:#0f3460;
  --green:#4a7c59;--green2:#2d5a27;
  --blue:#1e6091;--blue2:#0a3d62;
  --red:#7c2d2d;--red2:#5a1a1a;
  --gold:#b8860b;--gold2:#8b6914;
  --purple:#4a1a5a;--purple2:#2d0a3d;
  --orange:#7c4a1a;
  --text:#e8e8d8;--muted:#8a8a7a;--border:#2a2a4a;
  --tag-building:#8b6914;--tag-space:#1a5a7c;--tag-science:#2d7c2d;
  --tag-earth:#5a3a1a;--tag-plant:#2d5a1a;--tag-microbe:#1a5a3a;
  --tag-animal:#5a2d1a;--tag-power:#5a1a5a;--tag-jovian:#1a3a7c;
  --tag-venus:#7c1a5a;--tag-city:#5a5a1a;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.logo{font-size:14px;font-weight:700;letter-spacing:.08em;color:#c8a84b;white-space:nowrap}
.search-wrap{flex:1;position:relative;max-width:320px}
.search-input{width:100%;background:#0a0a1a;border:1px solid var(--border);border-radius:4px;color:var(--text);padding:5px 10px;font-size:12px;outline:none}
.search-input:focus{border-color:#4a6a8a}
.count-badge{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap}

/* TABS */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;display:flex;gap:2px;overflow-x:auto}
.tab-btn{padding:8px 12px;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:#c8a84b;border-bottom-color:#c8a84b}

/* CONTROLS */
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.ctrl-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
.sort-btns{display:flex;gap:4px}
.sort-btn{padding:3px 9px;background:#0a0a1a;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:11px;cursor:pointer}
.sort-btn.active{background:var(--surface2);border-color:#4a6a8a;color:var(--text)}
.exp-btns{display:flex;gap:4px;flex-wrap:wrap}
.exp-btn{padding:3px 9px;background:#0a0a1a;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:11px;cursor:pointer}
.exp-btn.active{border-color:#4a6a8a;color:var(--text)}
.exp-btn.active.base{background:#1a3a1a}
.exp-btn.active.venus{background:#3a1a2a}
.exp-btn.active.colonies{background:#1a2a3a}
.exp-btn.active.turmoil{background:#2a1a1a}
.exp-btn.active.promo{background:#2a2a1a}

/* CARD LIST */
.cards{padding:6px 8px;display:flex;flex-direction:column;gap:4px}

.card{border:1px solid var(--border);border-radius:4px;overflow:hidden;cursor:pointer;transition:border-color .1s}
.card:hover{border-color:#4a6a8a}
.card.expanded{border-color:#4a6a8a}

/* card type colors */
.card.automated .card-head{background:var(--green2)}
.card.active .card-head{background:var(--blue2)}
.card.event .card-head{background:var(--red2)}
.card.corp .card-head{background:var(--purple2)}
.card.prelude .card-head{background:var(--orange)}
.card.global .card-head{background:#2a1a3a}

.card-head{display:flex;align-items:center;gap:8px;padding:5px 10px;user-select:none}
.card-cost{width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.card-cost.prelude-cost{font-size:9px;letter-spacing:.03em}
.card-name{flex:1;font-size:13px;font-weight:600;color:#e8e8c8}
.card-id{font-size:10px;color:rgba(255,255,255,.4);margin-left:4px}
.card-tags{display:flex;gap:3px;flex-wrap:wrap}
.tag{display:inline-block;padding:1px 5px;border-radius:2px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.tag.building{background:var(--tag-building);color:#ffe}
.tag.space{background:var(--tag-space);color:#e8f4ff}
.tag.science{background:var(--tag-science);color:#e8ffe8}
.tag.earth{background:var(--tag-earth);color:#ffe8d8}
.tag.plant{background:var(--tag-plant);color:#d8ffd8}
.tag.microbe{background:var(--tag-microbe);color:#d8ffec}
.tag.animal{background:var(--tag-animal);color:#ffd8c8}
.tag.power{background:var(--tag-power);color:#f8d8ff}
.tag.jovian{background:var(--tag-jovian);color:#d8e8ff}
.tag.venus{background:var(--tag-venus);color:#ffd8f0}
.tag.city{background:var(--tag-city);color:#fffff0}
.tag.steel{background:var(--tag-building);color:#ffe}
.tag.wild{background:#3a3a3a;color:#ddd}

.card-right{display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0}
.card-vp{font-size:11px;font-weight:700;color:#c8a84b}
.card-req{font-size:10px;color:rgba(255,255,255,.5)}
.exp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.exp-dot.base{background:#4a8a4a}
.exp-dot.venus{background:#8a4a6a}
.exp-dot.colonies{background:#4a6a8a}
.exp-dot.turmoil{background:#8a4a4a}
.exp-dot.promo{background:#8a8a4a}

/* expanded body */
.card-body{padding:8px 12px 10px;background:#0a0a1a;border-top:1px solid var(--border);font-size:12px;color:#c8c8b8;line-height:1.6;display:none}
.card.expanded .card-body{display:block}

/* EMPTY STATE */
.empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<header>
  <div class="logo">TM CARDS</div>
  <div class="search-wrap">
    <input class="search-input" id="search" type="text" placeholder="Search cards…" autocomplete="off" oninput="render()"/>
  </div>
  <div class="count-badge" id="countBadge">— cards</div>
</header>

<div class="tabs" id="tabs">
  <button class="tab-btn active" data-tab="all" onclick="setTab('all',this)">ALL</button>
  <button class="tab-btn" data-tab="automated" onclick="setTab('automated',this)">AUTOMATED</button>
  <button class="tab-btn" data-tab="active" onclick="setTab('active',this)">ACTIVE</button>
  <button class="tab-btn" data-tab="event" onclick="setTab('event',this)">EVENTS</button>
  <button class="tab-btn" data-tab="corp" onclick="setTab('corp',this)">CORPS</button>
  <button class="tab-btn" data-tab="prelude" onclick="setTab('prelude',this)">PRELUDES</button>
  <button class="tab-btn" data-tab="global" onclick="setTab('global',this)">GLOBALS</button>
</div>

<div class="controls">
  <span class="ctrl-label">Sort</span>
  <div class="sort-btns">
    <button class="sort-btn active" data-sort="id" onclick="setSort('id',this)">ID</button>
    <button class="sort-btn" data-sort="cost_asc" onclick="setSort('cost_asc',this)">MC ↑</button>
    <button class="sort-btn" data-sort="cost_desc" onclick="setSort('cost_desc',this)">MC ↓</button>
    <button class="sort-btn" data-sort="name" onclick="setSort('name',this)">A–Z</button>
  </div>
  <span class="ctrl-label">Expansion</span>
  <div class="exp-btns">
    <button class="exp-btn base active" data-exp="base" onclick="toggleExp('base',this)">Base</button>
    <button class="exp-btn venus active" data-exp="venus" onclick="toggleExp('venus',this)">Venus</button>
    <button class="exp-btn colonies active" data-exp="colonies" onclick="toggleExp('colonies',this)">Colonies</button>
    <button class="exp-btn turmoil active" data-exp="turmoil" onclick="toggleExp('turmoil',this)">Turmoil</button>
    <button class="exp-btn promo active" data-exp="promo" onclick="toggleExp('promo',this)">Promo</button>
  </div>
</div>

<div class="cards" id="cardList"></div>

let tab = 'all';
let sort = 'id';
let exps = new Set(['base','venus','colonies','turmoil','promo']);
let expanded = new Set();

function setTab(t, el) {
  tab = t;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function setSort(s, el) {
  sort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function toggleExp(e, el) {
  if (exps.has(e)) exps.delete(e); else exps.add(e);
  el.classList.toggle('active', exps.has(e));
  render();
}

function toggleCard(id) {
  if (expanded.has(id)) expanded.delete(id); else expanded.add(id);
  const el = document.getElementById('card-'+id);
  if (el) el.classList.toggle('expanded', expanded.has(id));
}

function filtered() {
  let q = document.getElementById('search').value.toLowerCase().trim();
  return CARDS.filter(c => {
    if (!exps.has(c.exp)) return false;
    if (tab !== 'all' && c.type !== tab) return false;
    if (q) {
      return c.name.toLowerCase().includes(q) ||
             c.text.toLowerCase().includes(q) ||
             c.id.toLowerCase().includes(q) ||
             c.tags.some(t => t.includes(q));
    }
    return true;
  });
}

function sorted(cards) {
  return cards.slice().sort((a, b) => {
    if (sort === 'id') return String(a.id).localeCompare(String(b.id), undefined, {numeric:true});
    if (sort === 'cost_asc') return (Number(a.cost)||0) - (Number(b.cost)||0);
    if (sort === 'cost_desc') return (Number(b.cost)||0) - (Number(a.cost)||0);
    if (sort === 'name') return a.name.localeCompare(b.name);
    return 0;
  });
}

function tagHtml(tags) {
  return tags.map(t => '<span class="tag '+t+'">'+t+'</span>').join('');
}

function render() {
  const cards = sorted(filtered());
  document.getElementById('countBadge').textContent = cards.length + ' cards';
  if (!cards.length) {
    document.getElementById('cardList').innerHTML = '<div class="empty">No cards match.</div>';
    return;
  }
  document.getElementById('cardList').innerHTML = cards.map(c => {
    const isExp = expanded.has(c.id);
    const costDisp = c.type === 'prelude' ? 'PREL' : c.type === 'corp' ? 'CORP' : c.cost;
    const costClass = (c.type === 'prelude' || c.type === 'corp') ? 'prelude-cost' : '';
    return '<div class="card '+c.type+(isExp?' expanded':'')+'" id="card-'+c.id+'" onclick="toggleCard(\''+c.id+'\')">'+
      '<div class="card-head">'+
        '<div class="card-cost '+costClass+'">'+costDisp+'</div>'+
        '<div class="card-name">'+esc(c.name)+'<span class="card-id">#'+c.id+'</span></div>'+
        '<div class="card-tags">'+tagHtml(c.tags)+'</div>'+
        '<div class="card-right">'+
          (c.req ? '<span class="card-req">'+esc(c.req)+'</span>' : '')+
          (c.vp ? '<span class="card-vp">'+esc(c.vp)+' VP</span>' : '')+
          '<div class="exp-dot '+c.exp+'" title="'+c.exp+'"></div>'+
        '</div>'+
      '</div>'+
      (isExp && c.text ? '<div class="card-body">'+esc(c.text)+'</div>' : (!isExp ? '' : '<div class="card-body"></div>'))+
    '</div>';
  }).join('');
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

render();
</script>
